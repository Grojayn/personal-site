<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="舒尔特表">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>舒尔特表 - 专注力训练</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ===== 首页 ===== -->
  <div id="page-setup" class="page active">
    <div class="setup-inner">
      <h1 class="app-title">🧘 舒尔特表</h1>
      <p class="app-subtitle">专注力训练</p>

      <div class="setup-section">
        <label class="section-label">网格大小</label>
        <div class="chip-group" id="chipSize">
          <button class="chip" data-size="4">4×4</button>
          <button class="chip active" data-size="5">5×5</button>
          <button class="chip" data-size="8">8×8</button>
        </div>
      </div>

      <div class="setup-section">
        <label class="section-label">训练模式</label>
        <div class="chip-group" id="chipMode">
          <button class="chip active" data-mode="asc">顺序 1→N</button>
          <button class="chip" data-mode="desc">倒序 N→1</button>
        </div>
      </div>

      <button class="btn-start" id="btnStart">开始训练</button>

      <div class="setup-section best-section" id="bestSection">
        <label class="section-label">🏆 最佳记录</label>
        <div class="best-list" id="bestList">
          <div class="best-empty">暂无记录</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 游戏页 ===== -->
  <div id="page-game" class="page">
    <div class="game-header">
      <button class="btn-icon" id="btnBack" aria-label="返回">✕</button>
      <div class="game-stats">
        <span class="stat" id="statTimer">0.0s</span>
        <span class="stat-divider">|</span>
        <span class="stat" id="statTarget">→ <b>1</b></span>
        <span class="stat-divider">|</span>
        <span class="stat" id="statProgress">0/25</span>
      </div>
      <button class="btn-icon" id="btnRestart" aria-label="重来">↻</button>
    </div>

    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>
    </div>

    <div class="game-footer">
      <span class="mode-badge" id="modeBadge">顺序 · 5×5</span>
    </div>
  </div>

  <!-- ===== 结果弹窗 ===== -->
  <div class="modal-overlay" id="modalResult">
    <div class="modal">
      <div class="modal-emoji">✨</div>
      <div class="modal-time" id="modalTime">0.0s</div>
      <div class="modal-detail" id="modalDetail">5×5 · 顺序</div>
      <div class="modal-record" id="modalRecord"></div>
      <div class="modal-actions">
        <button class="modal-btn primary" id="modalAgain">再来一局</button>
        <button class="modal-btn" id="modalHome">返回首页</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
